{{ define "main" }}
<section class="page-hero">
  <div class="page-hero__bg" style="background-image:url('https://images.unsplash.com/photo-1560185893-a55cbc8c57e8?auto=format&fit=crop&w=1920&q=80')"></div>
  <div class="page-hero__overlay"></div>
  <div class="container page-hero__content">
    <span class="label">{{ i18n "accommodations" }}</span>
    <h1>{{ i18n "rooms_page_title" }}</h1>
    <p>{{ i18n "rooms_page_subtitle" }}</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="rooms-grid rooms-grid--full">
      {{ range .Site.RegularPages }}
        {{ if eq .Section "rooms" }}
          {{ partial "room-card.html" . }}
        {{ end }}
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
