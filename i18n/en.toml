[about_eyebrow]
other = "Our Story"
[about_title]
other = "Thirty-Seven Years of\nItalian Hospitality"
[about_body_1]
other = "Corte delle Rose began as a farmhouse — a corte, in the Lombard dialect — belonging to the Ferretti family. When Maria and Luca Ferretti opened their doors to guests in 1987, they asked a single question: how would we want to be welcomed?"
[about_body_2]
other = "The answer still guides us. Fresh flowers from the garden in every room. Breakfast served when you wake, not when we decide. An unhurried pace. And always, the roses."

