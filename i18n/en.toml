# Testimonial
[testimonial_quote]
other = "We arrived for two nights and stayed for five. The roses, the silence, the extraordinary kindness of the Ferretti family — Corte delle Rose is everything we had forgotten travel could be."
[testimonial_author]
other = "— Sophie & Marc, Paris"

