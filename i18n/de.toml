[about_eyebrow]
other = "Unsere Geschichte"
[about_title]
other = "Siebenunddreißig Jahre\nitalienische Gastfreundschaft"
[about_body_1]
other = "Die Hotel Boutique begann als Bauernhof — eine Corte, im lombardischen Dialekt — der Familie Ferretti. Als Maria und Luca Ferretti 1987 ihre Türen für Gäste öffneten, stellten sie sich eine einzige Frage: Wie möchten wir selbst willkommen geheißen werden?"
[about_body_2]
other = "Die Antwort leitet uns noch heute. Frische Blumen aus dem Garten in jedem Zimmer. Frühstück, wenn Sie aufwachen, nicht wenn wir es entscheiden. Ein ungehastetes Tempo. Und immer: die Rosen."
[usp_1_title]
other = "Rosengärten"
[usp_1_desc]
other = "Drei Hektar Gärten mit über 40 Sorten historischer Rosen, in Blüte von Mai bis Oktober."
[usp_2_title]
other = "Franciacorta-Wein"
[usp_2_desc]
other = "Wir liegen im Herzen des besten Schaumweinlandes Italiens. Geführte Verkostungen auf unseren Partnergütern."
[usp_3_title]
other = "Radwege"
[usp_3_desc]
other = "Fahrräder für Gäste verfügbar. Kuratierte Routen durch Weinberge, Dörfer und am See entlang."
[usp_4_title]
other = "Cucina di Nonna"
[usp_4_desc]
other = "Wöchentliche Kochkurse mit unserer Köchin Maria. Handgemachte Pasta, Risotto und saisonale Rezepte."
[testimonial_quote]
other = "Wir kamen für zwei Nächte und blieben fünf. Die Rosen, die Stille, die außerordentliche Freundlichkeit der Familie Ferretti — Hotel Boutique ist alles, was wir vergessen hatten, dass Reisen sein kann."
[testimonial_author]
other = "— Sophie & Marc, Paris"
