[intro_body]
other = "Nascosta dietro muri di pietra ricoperti di rose rampicanti, la Corte delle Rose accoglie i viaggiatori dal 1987. Le nostre cinque camere uniscono l'architettura secolare a un comfort moderno e discreto — ognuna diversa, ognuna un mondo privato."
