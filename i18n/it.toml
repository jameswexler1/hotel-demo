[about_title]
other = "Trentasette Anni di\nOspitalità Italiana"
[about_body_1]
other = "La Corte delle Rose nacque come cascina — una corte, nel dialetto lombardo — di proprietà della famiglia Ferretti. Quando Maria e Luca Ferretti aprirono le porte agli ospiti nel 1987, si posero una sola domanda: come vorremmo essere accolti?"
[about_body_2]
other = "La risposta ci guida ancora oggi. Fiori freschi del giardino in ogni camera. Colazione servita quando ci si sveglia, non quando decidiamo noi. Un ritmo senza fretta. E sempre, le rose."
[usp_1_title]
other = "Giardini di Rose"
[usp_1_desc]
other = "Tre ettari di giardini con oltre 40 varietà di rose antiche, in fiore da maggio a ottobre."
[usp_2_title]
other = "Vino Franciacorta"
[usp_2_desc]
other = "Siamo nel cuore della migliore zona spumantistica italiana. Degustazioni guidate nelle cantine partner."
[usp_3_title]
other = "Percorsi in Bicicletta"
[usp_3_desc]
other = "Biciclette disponibili per gli ospiti. Itinerari tra vigneti, borghi e lungo il lago."
[usp_4_title]
other = "Cucina di Nonna"
[usp_4_desc]
other = "Corsi di cucina settimanali con la nostra cuoca Maria. Pasta fatta a mano, risotti e ricette stagionali."
[testimonial_quote]
other = "Siamo arrivati per due notti e ci siamo fermati cinque. Le rose, il silenzio, la straordinaria gentilezza della famiglia Ferretti — Corte delle Rose è tutto ciò che avevamo dimenticato potesse essere un viaggio."
[testimonial_author]
other = "— Sophie & Marc, Parigi"
[cta_title]
other = "Prenota la Tua Camera"
[cta_subtitle]
other = "Solo cinque camere. Prenota in anticipo per non perdere la disponibilità."
[rooms_page_title]
other = "Le Nostre Camere"
[rooms_page_subtitle]
other = "Cinque camere intime, ognuna con il suo carattere — viste sul giardino, terrazze private e il lusso discreto della vera ospitalità italiana."
