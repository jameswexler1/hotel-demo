[about_title]
other = "Trente-Sept Ans\nd'Hospitalité Italienne"
[about_body_1]
other = "La Corte delle Rose a commencé comme une ferme — une corte, en dialecte lombard — appartenant à la famille Ferretti. Lorsque Maria et Luca Ferretti ont ouvert leurs portes aux voyageurs en 1987, ils se sont posé une seule question : comment voudrions-nous être accueillis ?"
[about_body_2]
other = "La réponse nous guide encore. Des fleurs fraîches du jardin dans chaque chambre. Le petit-déjeuner servi quand vous vous réveillez, pas quand nous le décidons. Un rythme sans hâte. Et toujours, les roses."
[usp_1_title]
other = "Jardins de Roses"
[usp_1_desc]
other = "Trois hectares de jardins avec plus de 40 variétés de roses anciennes, en fleurs de mai à octobre."
[usp_2_title]
other = "Vin Franciacorta"
[usp_2_desc]
other = "Nous sommes au cœur du meilleur pays de vin pétillant d'Italie. Dégustations guidées dans nos domaines partenaires."
[usp_3_title]
other = "Itinéraires Cyclistes"
[usp_3_desc]
other = "Vélos disponibles pour les clients. Itinéraires à travers vignobles, villages et au bord du lac."
[usp_4_title]
other = "Cuisine de Nonna"
[usp_4_desc]
other = "Cours de cuisine hebdomadaires avec notre cuisinière Maria. Pâtes maison, risotto et recettes de saison."
[testimonial_quote]
other = "Nous sommes arrivés pour deux nuits et sommes restés cinq. Les roses, le silence, la gentillesse extraordinaire de la famille Ferretti — Corte delle Rose est tout ce que nous avions oublié que le voyage pouvait être."
[testimonial_author]
other = "— Sophie & Marc, Paris"
