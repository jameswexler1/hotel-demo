baseURL = "https://hoteldemo.com"
title   = "Hotel Demo"
defaultContentLanguage          = "en"
defaultContentLanguageInSubdir  = true
enableRobotsTXT                 = true
summaryLength                   = 30

[imaging]
  quality = 85
  resampleFilter = "Lanczos"

[markup.goldmark.renderer]
  unsafe = true

[sitemap]
  changefreq = "weekly"
  priority   = 0.6

# ── Languages ──────────────────────────────────────────────
[languages.en]
  contentDir   = "content/en"
  languageName = "English"
  languageCode = "en"
  weight       = 1
  title        = "Corte delle Rose — Boutique Hotel, Lombardy"
  [languages.en.params]
    description = "A romantic boutique hotel nestled in the Lombardy countryside. Five beautifully appointed rooms, rose gardens, and timeless Italian hospitality near Brescia."

  [[languages.en.menus.main]]
    name   = "Rooms"
    url    = "/en/rooms/"
    weight = 1
  [[languages.en.menus.main]]
    name   = "Experiences"
    url    = "/en/experiences/"
    weight = 2
  [[languages.en.menus.main]]
    name   = "Gallery"
    url    = "/en/gallery/"
    weight = 3
  [[languages.en.menus.main]]
    name   = "About"
    url    = "/en/about/"
    weight = 4
  [[languages.en.menus.main]]
    name   = "Contact"
    url    = "/en/contact/"
    weight = 5
  [[languages.en.menus.main]]
    name   = "Book Now"
    url    = "/en/rooms/"
    weight = 6
    [languages.en.menus.main.params]
      cta = true

