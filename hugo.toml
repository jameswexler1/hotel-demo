# ── Global Params ──────────────────────────────────────────
[params]

  # ── Hotel Identity ─────────────────────────────────────────
  hotelName        = "Hotel Demo"
  hotelNameShort   = "Hotel Demo"
  tagline          = "A boutique sanctuary in the Lombardy countryside."
  foundedYear      = 1987
  yearsOfService   = 37        # update each year, or compute from foundedYear
  numberOfRooms    = 5
  roseVarieties    = "40+"
  gardenHectares   = "3ha"

  # ── Contact ────────────────────────────────────────────────
  email      = "info@hoteldemo.com"
  phone      = "+39 030 123 4567"
  address    = "Via delle Rose 12, 25030 Castrezzato (BS), Lombardia"
  street     = "Via delle Rose 12"
  city       = "Castrezzato"
  postalCode = "25030"
  province   = "BS"
  region     = "Lombardia"
  country    = "IT"
  vatNumber  = "01234567890"

  # ── Check-in / Check-out ───────────────────────────────────
  checkIn    = "15:00"
  checkOut   = "11:00"

  # ── Social ─────────────────────────────────────────────────
  instagram  = "https://instagram.com/hoteldemo"
  facebook   = "https://facebook.com/hoteldemo"

  # ── Legal pages ────────────────────────────────────────────
  privacyUrl = "/privacy/"
  termsUrl   = "/terms/"
  cookiesUrl = "/cookies/"

  # ── Stripe (replace with your real key before deploying) ───
  stripeKey  = "pk_test_REPLACE_WITH_YOUR_STRIPE_PUBLIC_KEY"

  # ── Hero Images (Unsplash URLs or local /static/ paths) ────
  heroImage  = "https://images.unsplash.com/photo-1586105449897-20b5efeb3233?auto=format&fit=crop&w=1920&q=80"
  heroImage2 = "https://images.unsplash.com/photo-1523531294919-4bcd7c65fd1d?auto=format&fit=crop&w=1920&q=80"
  ogImage    = "https://images.unsplash.com/photo-1586105449897-20b5efeb3233?auto=format&fit=crop&w=1200&q=80"

  # ── Google Maps embed URL ──────────────────────────────────
  mapEmbed   = "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d22393!2d10.0!3d45.5!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDXCsDMwJzAwLjAiTiAxMMKwMDAnMDAuMCJF!5e0!3m2!1sen!2sit!4v1"

  # ── Testimonial (change without touching templates) ────────
  testimonialQuote  = "We arrived for two nights and stayed for five. The roses, the silence, the extraordinary kindness of the Ferretti family — Corte delle Rose is everything we had forgotten travel could be."
  testimonialAuthor = "— Sophie & Marc, Paris"

  # ── Reception hours ────────────────────────────────────────
  receptionHours = "Daily 8:00 – 21:00"
